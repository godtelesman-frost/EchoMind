<!-- login.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EchoMind Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#070b17;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .login-box{
      width:400px;
      background:#111827;
      padding:40px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 30px rgba(124,58,237,0.4);
    }

    h1{
      margin-bottom:20px;
      color:#8b5cf6;
    }

    p{
      margin-top:15px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      font-weight:bold;
      cursor:pointer;
      margin-top:20px;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-3px);
    }

    #user{
      color:#cbd5e1;
      margin-top:25px;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <h1>EchoMind</h1>

    <p>
      Continue with Google
    </p>

    <button id="loginBtn">
      Sign In With Google
    </button>

    <button id="logoutBtn">
      Logout
    </button>

    <p id="user">
      Not Logged In
    </p>

  </div>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // REPLACE THESE WITH YOUR FIREBASE VALUES

    const firebaseConfig = {
  apiKey: "AIzaSyAt-wTjR617jZOOi5pHHNp22VGc5-j9HrM",
  authDomain: "echomind-e4e8f.firebaseapp.com",
  projectId: "echomind-e4e8f",
  storageBucket: "echomind-e4e8f.firebasestorage.app",
  messagingSenderId: "257680949964",
  appId: "1:257680949964:web:b6d5ce92c99b4f65867869",
  measurementId: "G-5WHN59PNPV"
    };

    // INITIALIZE FIREBASE

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const provider = new GoogleAuthProvider();

    // ELEMENTS

    const loginBtn = document.getElementById("loginBtn");

    const logoutBtn = document.getElementById("logoutBtn");

    const userText = document.getElementById("user");

    // GOOGLE LOGIN

    loginBtn.addEventListener("click", () => {

      signInWithPopup(auth, provider)

      .then((result) => {

        const user = result.user;

        userText.innerHTML =
          "Logged in as: " + user.email;

      })

      .catch((error) => {

        alert(error.message);

      });

    });

    // LOGOUT

    logoutBtn.addEventListener("click", () => {

      signOut(auth)

      .then(() => {

        userText.innerHTML = "Not Logged In";

      });

    });

    // AUTO LOGIN CHECK

    onAuthStateChanged(auth, (user) => {

      if(user){

        userText.innerHTML =
          "Logged in as: " + user.email;

      }else{

        userText.innerHTML =
          "Not Logged In";

      }

    });

  </script>

</body>

</html>
