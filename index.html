<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EchoMind</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b1020;
      color:white;
      text-align:center;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0b1020,#1e1b4b);
      padding:20px;
    }

    h1{
      font-size:4rem;
      margin-bottom:10px;
    }

    p{
      font-size:1.2rem;
      max-width:700px;
      color:#cbd5e1;
    }

    .btn{
      margin-top:30px;
      padding:15px 30px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      background:#8b5cf6;
    }

    .features{
      padding:80px 20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:20px;
      backdrop-filter:blur(10px);
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>EchoMind</h1>

    <p>
      AI-powered student productivity platform helping students
      manage time, stay consistent, and build disciplined routines.
    </p>

    <button class="btn">Get Started</button>
  </section>

  <section class="features">

    <div class="card">
      <h2>AI Planner</h2>
      <p>Smart scheduling for students.</p>
    </div>

    <div class="card">
      <h2>Focus Timer</h2>
      <p>Boost concentration using Pomodoro sessions.</p>
    </div>

    <div class="card">
      <h2>Habit Tracker</h2>
      <p>Build consistency and discipline daily.</p>
    </div>

  </section>

</body>
</html>
